<script>

window.addEventListener("load", async function(){

const URL="./";

let model;
let video=document.getElementById("video");
let preview=document.getElementById("preview");
let resultText=document.getElementById("result");
let stream;

const diseaseInfo={

"blight":{
thai:"โรคใบไหม้",
advice:"ตัดใบที่เป็นโรคออก ลดความชื้น และพ่นสารป้องกันเชื้อรา"
},

"gray":{
thai:"โรคใบจุดสีเทา",
advice:"ปลูกให้โปร่ง ลดความชื้น และพ่นสารป้องกันเชื้อรา"
},

"rust":{
thai:"โรคราสนิม",
advice:"เก็บใบที่เป็นโรคออก และพ่นสารป้องกันเชื้อรา"
},

"health":{
thai:"ใบสุขภาพดี",
advice:"ดูแลตามปกติ ให้น้ำและปุ๋ยเหมาะสม"
}

};

async function loadModel(){

const modelURL=URL+"model.json";
const metadataURL=URL+"metadata.json";

model=await tmImage.load(modelURL,metadataURL);

resultText.innerHTML="พร้อมใช้งาน ✅";

}

async function startCamera(){

stream=await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject=stream;

}

window.capture=function(){

const canvas=document.createElement("canvas");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

const ctx=canvas.getContext("2d");
ctx.drawImage(video,0,0);

preview.src=canvas.toDataURL();
preview.style.display="block";
video.style.display="none";

}

window.uploadImage=function(event){

const reader=new FileReader();

reader.onload=function(e){

preview.src=e.target.result;
preview.style.display="block";
video.style.display="none";

}

reader.readAsDataURL(event.target.files[0]);

}

window.classify=async function(){

if(!model){
resultText.innerHTML="โมเดลยังโหลดไม่เสร็จ";
return;
}

const prediction=await model.predict(preview);

let best=prediction.reduce((a,b)=>a.probability>b.probability?a:b);

let info=diseaseInfo[best.className];

if(info){

resultText.innerHTML=
`ผลลัพธ์: <b>${info.thai}</b><br>
ความมั่นใจ ${(best.probability*100).toFixed(2)}%<br><br>
วิธีดูแล:<br>${info.advice}`;

}

}

await loadModel();
await startCamera();

});

</script>
