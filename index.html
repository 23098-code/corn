<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Corn Disease Classifier</title>

<!-- TensorFlow -->
<script defer src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>

<!-- Teachable Machine -->
<script defer src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<style>
body{
font-family:Arial;
text-align:center;
background:#f4f6f7;
}

h1{
color:#2c3e50;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
border:none;
background:#2ecc71;
color:white;
border-radius:8px;
}

button:hover{
background:#27ae60;
}

video,img{
margin-top:10px;
border-radius:10px;
}

#result{
margin-top:20px;
font-size:18px;
}
</style>

</head>

<body>

<h1>Corn Disease Classifier 🌽</h1>

<video id="video" width="300" autoplay></video>
<br>

<button onclick="capture()">ถ่ายภาพ</button>

<br><br>

<input type="file" accept="image/*" onchange="uploadImage(event)">

<br><br>

<img id="preview" width="300" style="display:none;">

<br>

<button onclick="classify()">จำแนกโรค</button>

<p id="result">กำลังโหลดโมเดล...</p>

<script>

const URL="./";

let model;
let video;
let preview;
let resultText;
let stream;

const diseaseInfo={

"blight":{
thai:"โรคใบไหม้",
advice:"ตัดใบที่เป็นโรคออก ลดความชื้น และพ่นสารป้องกันเชื้อรา"
},

"gray":{
thai:"โรคใบจุดสีเทา",
advice:"ปลูกให้โปร่ง ลดความชื้น และพ่นสารป้องกันเชื้อรา"
},

"rust":{
thai:"โรคราสนิม",
advice:"เก็บใบที่เป็นโรคออก และพ่นสารป้องกันเชื้อรา"
},

"health":{
thai:"ใบสุขภาพดี",
advice:"ดูแลตามปกติ ให้น้ำและปุ๋ยเหมาะสม"
}

};

async function loadModel(){

const modelURL=URL+"model.json";
const metadataURL=URL+"metadata.json";

model=await tmImage.load(modelURL,metadataURL);

resultText.innerHTML="พร้อมใช้งาน ✅";

}

async function startCamera(){

stream=await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject=stream;

}

function capture(){

const canvas=document.createElement("canvas");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

const ctx=canvas.getContext("2d");
ctx.drawImage(video,0,0);

preview.src=canvas.toDataURL();
preview.style.display="block";
video.style.display="none";

}

function uploadImage(event){

const reader=new FileReader();

reader.onload=function(e){

preview.src=e.target.result;
preview.style.display="block";
video.style.display="none";

}

reader.readAsDataURL(event.target.files[0]);

}

async function classify(){

if(!model){
resultText.innerHTML="โมเดลยังโหลดไม่เสร็จ";
return;
}

const prediction=await model.predict(preview);

let best=prediction.reduce((a,b)=>a.probability>b.probability?a:b);

let info=diseaseInfo[best.className];

if(info){

resultText.innerHTML=
`ผลลัพธ์: <b>${info.thai}</b><br>
ความมั่นใจ ${(best.probability*100).toFixed(2)}%<br><br>
วิธีดูแล:<br>${info.advice}`;

}

}

window.onload=async()=>{

video=document.getElementById("video");
preview=document.getElementById("preview");
resultText=document.getElementById("result");

await loadModel();
await startCamera();

}

</script>

</body>
</html>
